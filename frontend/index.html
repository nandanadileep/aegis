<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" id="favicon" href="/favicon.svg" type="image/svg+xml" />
    <title>Identiti.</title>
    <meta name="description" content="Identiti turns your personal context into a living knowledge graph. Searchable, editable, and portable. You own it, you control it." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://identiti.nandanadileep.com" />
    <meta property="og:title" content="Identiti." />
    <meta property="og:description" content="Identiti turns your personal context into a living knowledge graph. Searchable, editable, and portable. You own it, you control it." />
    <meta property="og:image" content="https://identiti.nandanadileep.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Identiti." />
    <meta name="twitter:description" content="Identiti turns your personal context into a living knowledge graph. Searchable, editable, and portable. You own it, you control it." />
    <meta name="twitter:image" content="https://identiti.nandanadileep.com/og.png" />

    <script>
      const t = localStorage.getItem('identiti-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);

      // Emoji favicon — canvas approach works on all browsers including Safari
      const canvas = document.createElement('canvas');
      canvas.width = 64; canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.font = '56px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🫆', 32, 36);
      const link = document.getElementById('favicon');
      link.type = 'image/png';
      link.href = canvas.toDataURL();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
