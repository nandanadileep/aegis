<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aegis — Twin Graph</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #1a1a1a;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 60px;
      border-bottom: 1px solid #e8e8ed;
      flex-shrink: 0;
      background: #fff;
      gap: 12px;
      z-index: 50;
    }

    .brand { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; flex-shrink: 0; color: #1a1a1a; }
    nav { display: flex; gap: 4px; flex-shrink: 0; }

    .nav-link {
      padding: 6px 14px;
      border-radius: 80px;
      font-size: 13px;
      font-weight: 500;
      color: #6e6e73;
      text-decoration: none;
      transition: all 0.15s;
      border: 1px solid transparent;
    }
    .nav-link:hover { color: #1a1a1a; background: #f5f5f7; }
    .nav-link.active { color: #1a1a1a; border-color: #9e9ea6; background: #fff; }

    .search-wrap { flex: 1; max-width: 280px; }
    .search-wrap input {
      width: 100%;
      background: #f5f5f7;
      border: 1px solid #e8e8ed;
      border-radius: 80px;
      color: #1a1a1a;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      padding: 7px 16px;
      outline: none;
      transition: all 0.18s;
    }
    .search-wrap input:focus { border-color: #1a1a1a; box-shadow: 0 0 0 3px rgba(0,0,0,0.06); }
    .search-wrap input::placeholder { color: #9e9ea6; }

    .header-actions { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid #9e9ea6;
      background: #fff;
      color: #1a1a1a;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
      white-space: nowrap;
      letter-spacing: -0.01em;
    }
    .btn:hover { background: #f5f5f7; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-primary { background: #0d0c20; border-color: #0d0c20; color: #0000ee; }
    .btn-primary:hover { opacity: 0.85; background: #0d0c20; }

    .btn-success { background: #f0fdf4; border-color: #86efac; color: #16a34a; }
    .btn-success:hover { background: #dcfce7; }
    .btn-success:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-danger { background: #fff1f2; border-color: #fecdd3; color: #e11d48; }
    .btn-danger:hover { background: #ffe4e6; }

    .pending-pill {
      padding: 4px 12px;
      border-radius: 80px;
      font-size: 11px;
      font-weight: 700;
      background: #f5f5f7;
      border: 1px solid #e8e8ed;
      color: #6e6e73;
      transition: all 0.2s;
    }
    .pending-pill.active { background: #eff6ff; border-color: #bfdbfe; color: #0000ee; }

    /* ── Layout ── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    .graph-area { flex: 1; position: relative; background: #fafafa; overflow: hidden; border-right: 1px solid #e8e8ed; }

    #network {
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
      transition: filter 0.25s ease-out;
    }
    #network:active { cursor: grabbing; }

    /* ── Sidebar ── */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      background: #fff;
      border-left: 1px solid #e8e8ed;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-thumb { background: #e8e8ed; border-radius: 2px; }

    .s-section { padding: 20px 18px; border-bottom: 1px solid #e8e8ed; }

    .s-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #9e9ea6;
      margin-bottom: 12px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: #f5f5f7;
      border-radius: 8px;
      margin-bottom: 6px;
    }
    .stat-row .k { font-size: 13px; color: #6e6e73; }
    .stat-row .v { font-size: 13px; font-weight: 600; color: #1a1a1a; }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 7px 0;
      border-bottom: 1px solid #f5f5f7;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row .k { font-size: 12px; color: #9e9ea6; }
    .detail-row .v { font-size: 12px; font-weight: 500; color: #1a1a1a; text-align: right; max-width: 60%; word-break: break-word; }

    .result-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 4px;
    }
    .result-item:hover { background: #f5f5f7; }
    .result-item .r-name { font-size: 13px; color: #1a1a1a; }
    .result-item .r-type { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: #9e9ea6; }
    .no-results { font-size: 13px; color: #9e9ea6; text-align: center; padding: 20px 0; }

    .change-item {
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      color: #1a1a1a;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      margin-bottom: 5px;
    }
    .change-item.del { background: #fff1f2; border-color: #fecdd3; }

    .s-btn-row { display: flex; flex-direction: column; gap: 6px; }

    /* ── Modal ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .overlay.show { display: flex; }

    .modal {
      background: #fff;
      border: 1px solid #e8e8ed;
      border-radius: 16px;
      padding: 28px;
      width: 90%;
      max-width: 460px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    }
    .modal h3 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; color: #1a1a1a; }
    .modal p { font-size: 13px; color: #6e6e73; margin-bottom: 20px; line-height: 1.5; }
    .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
    .modal-actions .btn { flex: 1; justify-content: center; }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9e9ea6;
      margin-bottom: 6px;
    }
    .field input, .field textarea {
      width: 100%;
      background: #f5f5f7;
      border: 1px solid #e8e8ed;
      border-radius: 8px;
      color: #1a1a1a;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .field input:focus, .field textarea:focus {
      border-color: #1a1a1a;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
    }
    .field input::placeholder, .field textarea::placeholder { color: #9e9ea6; }
    .field textarea { resize: vertical; min-height: 80px; }

    .changes-scroll { max-height: 200px; overflow-y: auto; }

    @media (max-width: 900px) { .sidebar { width: 240px; } }
  </style>
</head>
<body>
  <header>
    <span class="brand">Aegis</span>
    <nav>
      <a href="/chat" class="nav-link">Chat</a>
      <a href="/memory" class="nav-link active">Graph</a>
    </nav>

    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search nodes & relationships…"
        onkeydown="if(event.key==='Enter') runSearch()"
        oninput="if(this.value==='') clearSearch()" />
    </div>

    <div class="header-actions">
      <span class="pending-pill" id="pendingBadge">0 pending</span>
      <button class="btn" onclick="downloadWallet()">⬇ Twin Card</button>
      <button class="btn" onclick="sb.auth.signOut().then(() => window.location.href='/login')">Sign out</button>
      <button class="btn" id="resetBtn" onclick="resetPendingChanges()" disabled>Reset</button>
      <button class="btn btn-success" id="commitBtn" onclick="showCommitModal()" disabled>Commit</button>
    </div>
  </header>

  <div class="layout">
    <div class="graph-area">
      <canvas id="network"></canvas>
    </div>

    <div class="sidebar">
      <div class="s-section">
        <div class="s-label">Graph</div>
        <div class="stat-row"><span class="k">Nodes</span><span class="v" id="nodeCount">0</span></div>
        <div class="stat-row"><span class="k">Relationships</span><span class="v" id="edgeCount">0</span></div>
      </div>


      <div class="s-section" id="searchSection" style="display:none">
        <div class="s-label">Search Results</div>
        <div id="searchResults"></div>
      </div>

      <div class="s-section" id="nodeSection" style="display:none">
        <div class="s-label">Node</div>
        <div id="nodeDetails"></div>
        <div style="margin-top:12px">
          <button class="btn btn-danger" style="width:100%; justify-content:center" onclick="deleteSelectedNode()">Delete Node</button>
        </div>
      </div>

      <div class="s-section" id="edgeSection" style="display:none">
        <div class="s-label">Relationship</div>
        <div id="edgeDetails"></div>
        <div style="margin-top:12px">
          <button class="btn btn-danger" style="width:100%; justify-content:center" onclick="deleteSelectedEdge()">Delete Relationship</button>
        </div>
      </div>

      <div class="s-section">
        <div class="s-label">Add</div>
        <div class="s-btn-row">
          <button class="btn" style="justify-content:center" onclick="showAddNodeModal()">+ Node</button>
          <button class="btn" style="justify-content:center" onclick="showAddEdgeModal()">+ Relationship</button>
        </div>
      </div>

      <div class="s-section" id="changesSection" style="display:none">
        <div class="s-label">Pending</div>
        <div class="changes-scroll" id="changesList"></div>
      </div>
    </div>
  </div>

  <!-- Add Node Modal -->
  <div class="overlay" id="addNodeModal">
    <div class="modal">
      <h3>Add Node</h3>
      <p>Create a new node and link it to your profile.</p>
      <div class="field"><label>Label</label><input type="text" id="nodeLabel" placeholder="Skill, Value, Goal…" /></div>
      <div class="field"><label>Name</label><input type="text" id="nodeName" placeholder="e.g. Python, Discipline…" /></div>
      <div class="field"><label>Properties (JSON, optional)</label><textarea id="nodeProps" placeholder='{"level": "expert"}'></textarea></div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal('addNodeModal')">Cancel</button>
        <button class="btn btn-primary" onclick="addNode()">Add Node</button>
      </div>
    </div>
  </div>

  <!-- Add Edge Modal -->
  <div class="overlay" id="addEdgeModal">
    <div class="modal">
      <h3>Add Relationship</h3>
      <p>Connect two existing nodes.</p>
      <div class="field"><label>From Node ID</label><input type="text" id="edgeFrom" placeholder="Source node ID" /></div>
      <div class="field"><label>Relationship Type</label><input type="text" id="edgeType" placeholder="WORKS_ON, KNOWS, HAS_SKILL…" /></div>
      <div class="field"><label>To Node ID</label><input type="text" id="edgeTo" placeholder="Target node ID" /></div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal('addEdgeModal')">Cancel</button>
        <button class="btn btn-primary" onclick="addEdge()">Add Relationship</button>
      </div>
    </div>
  </div>

  <!-- Commit Modal -->
  <div class="overlay" id="commitModal">
    <div class="modal">
      <h3>Commit Changes</h3>
      <p>Apply all pending changes to your memory graph.</p>
      <div class="changes-scroll" id="commitList"></div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal('commitModal')">Cancel</button>
        <button class="btn btn-success" onclick="commitChanges()">Confirm &amp; Save</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = window.supabase;
    let sb = null;
    let _session = null;

    async function initAuth() {
      const cfg = await fetch('/api/config').then(r => r.json());
      sb = createClient(cfg.supabase_url, cfg.supabase_anon_key);
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '/login'; return; }
      _session = session;
      sb.auth.onAuthStateChange((_e, s) => { _session = s; if (!s) window.location.href = '/login'; });
      loadGraph();
    }

    function authHeaders(extra) {
      return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${_session.access_token}`, ...extra };
    }

    // ── Simple DataSet ──
    class SimpleDataSet {
      constructor() { this._data = new Map(); }
      add(items) {
        const arr = Array.isArray(items) ? items : [items];
        arr.forEach(item => { if (item && item.id != null) this._data.set(String(item.id), { ...item }); });
      }
      remove(id) { this._data.delete(String(id)); }
      get(idOrOpts) {
        if (idOrOpts === undefined) return [...this._data.values()];
        if (typeof idOrOpts === 'object' && idOrOpts.filter) return [...this._data.values()].filter(idOrOpts.filter);
        return this._data.get(String(idOrOpts)) || null;
      }
      getIds() { return [...this._data.keys()]; }
      get length() { return this._data.size; }
      update(items) {
        const arr = Array.isArray(items) ? items : [items];
        arr.forEach(item => {
          const ex = this._data.get(String(item.id));
          if (ex) this._data.set(String(item.id), { ...ex, ...item });
        });
      }
      clear() { this._data.clear(); }
    }

    // ── State ──
    const personId  = new URLSearchParams(window.location.search).get('person_id') || null;
    const graphData = { nodes: new SimpleDataSet(), edges: new SimpleDataSet() };
    let pending     = { nodes: {}, edges: {}, deletedNodes: [], deletedEdges: [] };
    let selectedNode = null;
    let selectedEdge = null;

    // ── Canvas setup ──
    const canvas = document.getElementById('network');
    const ctx    = canvas.getContext('2d');

    function resizeCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width  = rect.width;
      canvas.height = rect.height;
    }
    new ResizeObserver(resizeCanvas).observe(canvas.parentElement);
    resizeCanvas();

    // ── Camera ──
    const cam = { x: 0, y: 0, scale: 1, tx: 0, ty: 0, ts: 1 };

    // ── Mouse ──
    const mouse = { sx: -9999, sy: -9999, wx: -9999, wy: -9999, radius: 130 };

    // ── Anim nodes ──
    const animNodes = new Map(); // id -> { x, y, baseX, baseY, angle, av, phase, ar }

    // ── Interaction state ──
    let dragging = false, dragStartSX = 0, dragStartSY = 0, camStartX = 0, camStartY = 0;
    let draggedNode = null, dragOffX = 0, dragOffY = 0, didDrag = false;
    let hoveredNode = null, hoveredEdge = null;
    let searchHighlight = new Set();
    let zoomTimer = null;
    let shiftHeld = false;

    window.addEventListener('keydown', e => { if (e.key === 'Shift') { shiftHeld = true;  canvas.style.cursor = hoveredNode ? 'pointer' : 'crosshair'; } });
    window.addEventListener('keyup',   e => { if (e.key === 'Shift') { shiftHeld = false; canvas.style.cursor = hoveredNode ? 'pointer' : 'grab'; } });

    // ── Coord helpers ──
    function screenToWorld(sx, sy) {
      return { x: (sx - cam.x) / cam.scale, y: (sy - cam.y) / cam.scale };
    }

    function hitNode(wx, wy) {
      const r = 10 / cam.scale;
      for (const [id, an] of animNodes) {
        const dx = an.x - wx, dy = an.y - wy;
        if (dx * dx + dy * dy < r * r) return id;
      }
      return null;
    }

    function hitEdge(wx, wy) {
      const thresh = 7 / cam.scale;
      for (const eid of graphData.edges.getIds()) {
        const e = graphData.edges.get(eid);
        const a = animNodes.get(String(e.from)), b = animNodes.get(String(e.to));
        if (!a || !b) continue;
        const dx = b.x - a.x, dy = b.y - a.y, len2 = dx * dx + dy * dy;
        if (len2 === 0) continue;
        const t  = Math.max(0, Math.min(1, ((wx - a.x) * dx + (wy - a.y) * dy) / len2));
        const px = a.x + t * dx - wx, py = a.y + t * dy - wy;
        if (px * px + py * py < thresh * thresh) return eid;
      }
      return null;
    }

    // ── Force-directed layout (runs synchronously before first frame) ──
    function computeLayout(nodeList, edgeList) {
      const W = canvas.width || 800, H = canvas.height || 600;
      const pos = new Map();

      // Start in a circle
      nodeList.forEach((n, i) => {
        const a = (i / nodeList.length) * Math.PI * 2;
        const r = Math.min(W, H) * 0.3;
        pos.set(String(n.id), {
          x: W / 2 + Math.cos(a) * r + (Math.random() - 0.5) * 50,
          y: H / 2 + Math.sin(a) * r + (Math.random() - 0.5) * 50,
          vx: 0, vy: 0,
        });
      });

      for (let iter = 0; iter < 350; iter++) {
        const cool = Math.max(0.05, 1 - iter / 250);
        const ids  = [...pos.keys()];

        // Repulsion
        for (let i = 0; i < ids.length; i++) {
          for (let j = i + 1; j < ids.length; j++) {
            const a = pos.get(ids[i]), b = pos.get(ids[j]);
            const dx = a.x - b.x, dy = a.y - b.y;
            const dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
            const f = (6000 / (dist * dist)) * cool;
            a.vx += (dx / dist) * f; a.vy += (dy / dist) * f;
            b.vx -= (dx / dist) * f; b.vy -= (dy / dist) * f;
          }
        }

        // Attraction along edges
        edgeList.forEach(e => {
          const a = pos.get(String(e.from)), b = pos.get(String(e.to));
          if (!a || !b) return;
          const dx = b.x - a.x, dy = b.y - a.y;
          const dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
          const ideal = 170, f = (dist - ideal) * 0.006 * cool;
          a.vx += (dx / dist) * f; a.vy += (dy / dist) * f;
          b.vx -= (dx / dist) * f; b.vy -= (dy / dist) * f;
        });

        // Center gravity
        pos.forEach(p => { p.vx += (W / 2 - p.x) * 0.003; p.vy += (H / 2 - p.y) * 0.003; });

        // Integrate
        pos.forEach(p => { p.x += p.vx * 0.6; p.y += p.vy * 0.6; p.vx *= 0.82; p.vy *= 0.82; });
      }

      return pos;
    }

    function makeAnimNode(id, x, y) {
      return {
        id: String(id), x, y, baseX: x, baseY: y,
        angle: Math.random() * Math.PI * 2,
        av:    (Math.random() - 0.5) * 0.01,
        phase: Math.random() * Math.PI * 2,
        ar:    10 + Math.random() * 8,
      };
    }

    function rebuildAnimNodes() {
      const nodeList = graphData.nodes.getIds().map(id => graphData.nodes.get(id)).filter(Boolean);
      const edgeList = graphData.edges.getIds().map(id => graphData.edges.get(id)).filter(Boolean);
      const positions = computeLayout(nodeList, edgeList);
      animNodes.clear();
      positions.forEach((p, id) => animNodes.set(id, makeAnimNode(id, p.x, p.y)));
    }

    // ── Node animation update ──
    function updateAnimNode(an) {
      an.angle += an.av;
      an.phase += 0.011;
      const ax = Math.cos(an.angle) * an.ar;
      const ay = Math.sin(an.angle) * an.ar + Math.cos(an.phase) * 5;

      if (!shiftHeld) {
        const dx = mouse.wx - an.x, dy = mouse.wy - an.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < mouse.radius && mouse.wx > -9000) {
          const force = (mouse.radius - dist) / mouse.radius;
          const angle = Math.atan2(dy, dx);
          an.x -= Math.cos(angle) * force * 12;
          an.y -= Math.sin(angle) * force * 12;
          return;
        }
      }
      an.x += (an.baseX + ax - an.x) * 0.05;
      an.y += (an.baseY + ay - an.y) * 0.05;
    }

    // ── Render loop ──
    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Smooth camera lerp
      cam.x += (cam.tx - cam.x) * 0.1;
      cam.y += (cam.ty - cam.y) * 0.1;
      cam.scale += (cam.ts - cam.scale) * 0.1;

      ctx.save();
      ctx.translate(cam.x, cam.y);
      ctx.scale(cam.scale, cam.scale);

      // ── Draw edges ──
      for (const eid of graphData.edges.getIds()) {
        const e  = graphData.edges.get(eid);
        const a  = animNodes.get(String(e.from));
        const b  = animNodes.get(String(e.to));
        if (!a || !b) continue;

        const isSel = eid === selectedEdge;
        const isHov = eid === hoveredEdge;

        ctx.save();
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);

        if (isSel || isHov) {
          ctx.shadowBlur  = 10;
          ctx.shadowColor = 'rgba(41,151,255,0.6)';
          ctx.strokeStyle = 'rgba(96,184,255,0.9)';
          ctx.lineWidth   = 2 / cam.scale;
        } else {
          const dx = a.x - b.x, dy = a.y - b.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const op = Math.max(0.04, 0.35 - dist / 1400);
          ctx.strokeStyle = `rgba(41,151,255,${op})`;
          ctx.lineWidth   = 1 / cam.scale;
        }
        ctx.stroke();
        ctx.restore();

        // Edge label on select/hover
        if ((isSel || isHov) && e.label) {
          ctx.font      = `${11 / cam.scale}px -apple-system, sans-serif`;
          ctx.fillStyle = 'rgba(134,134,139,0.9)';
          ctx.textAlign = 'center';
          ctx.fillText(e.label, (a.x + b.x) / 2, (a.y + b.y) / 2 - 7 / cam.scale);
        }
      }

      // ── Node type colours ──
      const NODE_PALETTE = {
        'Person':     { fill: '#2997ff', glow: 'rgba(41,151,255,0.8)'  },
        'Skill':      { fill: '#30d158', glow: 'rgba(48,209,88,0.7)'   },
        'Value':      { fill: '#ff9f0a', glow: 'rgba(255,159,10,0.7)'  },
        'Goal':       { fill: '#ff375f', glow: 'rgba(255,55,95,0.7)'   },
        'Trait':      { fill: '#bf5af2', glow: 'rgba(191,90,242,0.7)'  },
        'Identity':   { fill: '#64d2ff', glow: 'rgba(100,210,255,0.7)' },
        'Project':    { fill: '#ffd60a', glow: 'rgba(255,214,10,0.7)'  },
        'Behavior':   { fill: '#ff6961', glow: 'rgba(255,105,97,0.7)'  },
        'Constraint': { fill: '#ac8e68', glow: 'rgba(172,142,104,0.7)' },
        'Belief':     { fill: '#32ade6', glow: 'rgba(50,173,230,0.7)'  },
      };
      const DEFAULT_PALETTE = { fill: '#2997ff', glow: 'rgba(41,151,255,0.75)' };

      // ── Draw nodes ──
      for (const [id, an] of animNodes) {
        if (id !== draggedNode) updateAnimNode(an);

        const node  = graphData.nodes.get(id);
        if (!node) continue;

        const isSel  = id === selectedNode;
        const isHov  = id === hoveredNode;
        const isHigh = searchHighlight.has(id);
        const type   = node.title || 'Node';
        const pal    = NODE_PALETTE[type] || DEFAULT_PALETTE;
        const r      = (type === 'Person' ? (isSel ? 11 : 9) : (isSel ? 8 : 6)) / cam.scale;

        ctx.save();
        ctx.shadowBlur  = isSel ? 28 : isHov ? 18 : isHigh ? 22 : 10;
        ctx.shadowColor = isHigh ? 'rgba(255,214,10,0.8)' : pal.glow;

        // Fill with type colour, dim if not selected/hovered
        const alpha = isSel ? 1 : isHov ? 0.95 : 0.75;
        ctx.fillStyle   = pal.fill + (alpha < 1 ? Math.round(alpha * 255).toString(16).padStart(2,'0') : '');
        ctx.strokeStyle = isSel ? '#fff' : isHigh ? '#ffd60a' : pal.fill;
        ctx.lineWidth   = (isSel ? 2.5 : 1.5) / cam.scale;
        ctx.beginPath();
        ctx.arc(an.x, an.y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.restore();

        // Label — hover/select only
        if (isSel || isHov || isHigh) {
          const label = node._label || node.label || '';
          const fs    = Math.max(9, 12 / cam.scale);
          ctx.font      = `600 ${fs}px -apple-system, BlinkMacSystemFont, sans-serif`;
          ctx.fillStyle = '#f5f5f7';
          ctx.textAlign = 'center';
          ctx.fillText(label, an.x, an.y - r - 6 / cam.scale);
        }
      }

      ctx.restore();
      requestAnimationFrame(render);
    }

    // ── Mouse events ──
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      mouse.sx = e.clientX - rect.left;
      mouse.sy = e.clientY - rect.top;
      const w  = screenToWorld(mouse.sx, mouse.sy);
      mouse.wx = w.x; mouse.wy = w.y;

      if (draggedNode) {
        const an = animNodes.get(draggedNode);
        if (an) { an.x = w.x + dragOffX; an.y = w.y + dragOffY; an.baseX = an.x; an.baseY = an.y; }
        didDrag = true;
        return;
      }
      if (dragging && !shiftHeld) {
        cam.tx = camStartX + (mouse.sx - dragStartSX);
        cam.ty = camStartY + (mouse.sy - dragStartSY);
        didDrag = true;
        return;
      }

      hoveredNode = hitNode(w.x, w.y);
      hoveredEdge = hoveredNode ? null : hitEdge(w.x, w.y);
      canvas.style.cursor = (hoveredNode || hoveredEdge) ? 'pointer' : 'grab';
    });

    canvas.addEventListener('mouseleave', () => {
      mouse.wx = -9999; mouse.wy = -9999;
      hoveredNode = null; hoveredEdge = null;
    });

    canvas.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      const rect = canvas.getBoundingClientRect();
      const sx   = e.clientX - rect.left, sy = e.clientY - rect.top;
      const w    = screenToWorld(sx, sy);
      didDrag    = false;

      if (e.shiftKey) {
        // Shift held — interact with nodes
        const hn = hitNode(w.x, w.y);
        if (hn) {
          draggedNode = hn;
          const an = animNodes.get(hn);
          dragOffX = an.x - w.x; dragOffY = an.y - w.y;
          return;
        }
      }

      // Default — pan
      dragging    = true;
      dragStartSX = sx; dragStartSY = sy;
      camStartX   = cam.tx; camStartY = cam.ty;
      canvas.style.cursor = 'grabbing';
    });

    canvas.addEventListener('mouseup', e => {
      if (e.button !== 0) return;
      const rect = canvas.getBoundingClientRect();
      const w    = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);

      if (!didDrag && e.shiftKey) {
        const hn = hitNode(w.x, w.y);
        const he = hn ? null : hitEdge(w.x, w.y);
        if (hn)      { selectedNode = hn === selectedNode ? null : hn; selectedEdge = null; }
        else if (he) { selectedEdge = he === selectedEdge ? null : he; selectedNode = null; }
        else         { selectedNode = null; selectedEdge = null; }
        updateSidebar();
      }
      draggedNode = null; dragging = false;
      canvas.style.cursor = hoveredNode ? 'pointer' : 'grab';
    });

    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      const rect   = canvas.getBoundingClientRect();
      const sx     = e.clientX - rect.left, sy = e.clientY - rect.top;
      const factor = e.deltaY > 0 ? 0.88 : 1.14;
      const ns     = Math.max(0.1, Math.min(6, cam.ts * factor));
      const wx     = (sx - cam.tx) / cam.ts;
      const wy     = (sy - cam.ty) / cam.ts;
      cam.tx = sx - wx * ns;
      cam.ty = sy - wy * ns;
      cam.ts = ns;

      // Zoom brightness flash
      clearTimeout(zoomTimer);
      canvas.style.filter = 'brightness(1.35)';
      zoomTimer = setTimeout(() => { canvas.style.filter = 'brightness(1)'; }, 220);
    }, { passive: false });

    // ── Network adapter ──
    const network = {
      selectNodes(ids) { selectedNode = ids[0] || null; selectedEdge = null; },
      unselectAll()    { selectedNode = null; selectedEdge = null; updateSidebar(); },
      fit({ nodes: nodeIds, animation } = {}) {
        const targets = nodeIds
          ? nodeIds.map(id => animNodes.get(String(id))).filter(Boolean)
          : [...animNodes.values()];
        if (!targets.length) return;
        const xs = targets.map(n => n.baseX), ys = targets.map(n => n.baseY);
        const minX = Math.min(...xs), maxX = Math.max(...xs);
        const minY = Math.min(...ys), maxY = Math.max(...ys);
        const pad  = 80;
        const ns   = Math.min(
          (canvas.width  - pad * 2) / (maxX - minX + 1),
          (canvas.height - pad * 2) / (maxY - minY + 1),
          2
        );
        const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
        cam.ts = ns;
        cam.tx = canvas.width  / 2 - cx * ns;
        cam.ty = canvas.height / 2 - cy * ns;
      },
      focus(id, { scale = 1.5 } = {}) {
        const an = animNodes.get(String(id));
        if (!an) return;
        cam.ts = scale;
        cam.tx = canvas.width  / 2 - an.baseX * scale;
        cam.ty = canvas.height / 2 - an.baseY * scale;
      },
    };

    // ── Load graph ──
    async function loadGraph() {
      const resp = await fetch('/api/graph', { headers: authHeaders() });
      if (!resp.ok) { alert('Failed to load graph'); return; }
      const data = await resp.json();
      graphData.nodes.clear();
      graphData.edges.clear();
      graphData.nodes.add(data.nodes.map(n => ({ ...n, _label: n.label, label: ' ' })));
      graphData.edges.add(data.edges);
      rebuildAnimNodes();
      updateStats();
      // Fit all nodes into view
      network.fit();
    }

    // ── Sidebar ──
    function updateSidebar() {
      document.getElementById('nodeSection').style.display = selectedNode ? 'block' : 'none';
      document.getElementById('edgeSection').style.display = selectedEdge ? 'block' : 'none';

      if (selectedNode) {
        const n = graphData.nodes.get(selectedNode);
        const typeColors = {
          'Person':'#2997ff','Skill':'#30d158','Value':'#ff9f0a','Goal':'#ff375f',
          'Trait':'#bf5af2','Identity':'#64d2ff','Project':'#ffd60a',
          'Behavior':'#ff6961','Constraint':'#ac8e68','Belief':'#32ade6'
        };
        const typeColor = typeColors[n?.title] || '#86868b';
        document.getElementById('nodeDetails').innerHTML = n ? `
          <div class="detail-row"><span class="k">Name</span><span class="v">${n._label || n.label || '—'}</span></div>
          ${n.title ? `<div class="detail-row"><span class="k">Type</span><span class="v" style="color:${typeColor}">${n.title}</span></div>` : ''}
        ` : '';
      }

      if (selectedEdge) {
        const e  = graphData.edges.get(selectedEdge);
        const fn = graphData.nodes.get(String(e?.from));
        const tn = graphData.nodes.get(String(e?.to));
        document.getElementById('edgeDetails').innerHTML = e ? `
          <div class="detail-row"><span class="k">Type</span><span class="v">${e.label || '—'}</span></div>
          <div class="detail-row"><span class="k">From</span><span class="v">${fn?._label || e.from}</span></div>
          <div class="detail-row"><span class="k">To</span><span class="v">${tn?._label || e.to}</span></div>
        ` : '';
      }

      updateChangesList();
    }

    function updateStats() {
      document.getElementById('nodeCount').textContent = graphData.nodes.length;
      document.getElementById('edgeCount').textContent = graphData.edges.length;
    }

    // ── Pending changes ──
    function updatePendingBadge() {
      const n = Object.keys(pending.nodes).length + Object.keys(pending.edges).length
              + pending.deletedNodes.length + pending.deletedEdges.length;
      const el = document.getElementById('pendingBadge');
      el.textContent = n + ' pending';
      el.classList.toggle('active', n > 0);
      document.getElementById('commitBtn').disabled = n === 0;
      document.getElementById('resetBtn').disabled  = n === 0;
    }

    function updateChangesList() {
      const items = [];
      Object.entries(pending.nodes).forEach(([, c]) => items.push(`<div class="change-item">+ Node: ${c.name}</div>`));
      Object.entries(pending.edges).forEach(([, c]) => items.push(`<div class="change-item">+ Rel: ${c.relType}</div>`));
      pending.deletedNodes.forEach(id => items.push(`<div class="change-item del">− Node: ${id}</div>`));
      pending.deletedEdges.forEach(id => items.push(`<div class="change-item del">− Rel: ${id}</div>`));

      const hasChanges = items.length > 0;
      document.getElementById('changesSection').style.display = hasChanges ? 'block' : 'none';
      document.getElementById('changesList').innerHTML = items.join('');
    }

    function resetPendingChanges() {
      if (!confirm('Discard all pending changes?')) return;
      pending = { nodes: {}, edges: {}, deletedNodes: [], deletedEdges: [] };
      loadGraph();
      updatePendingBadge();
      updateSidebar();
    }

    // ── Add node ──
    function showAddNodeModal() {
      document.getElementById('nodeLabel').value = '';
      document.getElementById('nodeName').value  = '';
      document.getElementById('nodeProps').value  = '';
      showModal('addNodeModal');
    }

    async function addNode() {
      const label    = document.getElementById('nodeLabel').value.trim();
      const name     = document.getElementById('nodeName').value.trim();
      const propsStr = document.getElementById('nodeProps').value.trim();
      if (!label || !name) { alert('Label and Name are required'); return; }

      let props = {};
      if (propsStr) {
        try { props = JSON.parse(propsStr); }
        catch { alert('Invalid JSON properties'); return; }
      }

      const resp = await fetch('/api/nodes', {
        method: 'POST', headers: authHeaders(),
        body: JSON.stringify({ label, name, properties: props }),
      });
      if (!resp.ok) { const err = await resp.json(); alert(err.error || 'Failed'); return; }
      const data = await resp.json();

      const newId = String(data.id);
      graphData.nodes.add({ id: newId, _label: name, label: ' ', title: label });

      // Place new node near center with slight offset
      const cx = canvas.width / 2, cy = canvas.height / 2;
      const w  = screenToWorld(cx, cy);
      animNodes.set(newId, makeAnimNode(newId, w.x + (Math.random() - 0.5) * 100, w.y + (Math.random() - 0.5) * 100));

      pending.nodes[newId] = { type: 'add', label, name };
      updatePendingBadge(); updateStats(); updateSidebar();
      closeModal('addNodeModal');
    }

    // ── Add edge ──
    function showAddEdgeModal() {
      document.getElementById('edgeFrom').value = selectedNode || '';
      document.getElementById('edgeType').value = '';
      document.getElementById('edgeTo').value   = '';
      showModal('addEdgeModal');
    }

    async function addEdge() {
      const fromId  = document.getElementById('edgeFrom').value.trim();
      const relType = document.getElementById('edgeType').value.trim();
      const toId    = document.getElementById('edgeTo').value.trim();
      if (!fromId || !relType || !toId) { alert('All fields required'); return; }
      if (!graphData.nodes.get(fromId) || !graphData.nodes.get(toId)) {
        alert('Node IDs not found in graph'); return;
      }

      const resp = await fetch('/api/relationships', {
        method: 'POST', headers: authHeaders(),
        body: JSON.stringify({ from: fromId, type: relType, to: toId }),
      });
      if (!resp.ok) { const err = await resp.json(); alert(err.error || 'Failed'); return; }
      const data = await resp.json();

      graphData.edges.add({ id: String(data.id), from: fromId, to: toId, label: relType });
      pending.edges[String(data.id)] = { type: 'add', relType };
      updatePendingBadge(); updateSidebar();
      closeModal('addEdgeModal');
    }

    // ── Delete ──
    function deleteSelectedNode() {
      if (!selectedNode) return;
      const n = graphData.nodes.get(selectedNode);
      if (!confirm(`Delete "${n?._label || selectedNode}"? All its relationships will also be removed.`)) return;

      const connected = graphData.edges.get({ filter: e => String(e.from) === selectedNode || String(e.to) === selectedNode });
      connected.forEach(e => { graphData.edges.remove(e.id); pending.deletedEdges.push(e.id); });
      graphData.nodes.remove(selectedNode);
      animNodes.delete(selectedNode);
      pending.deletedNodes.push(selectedNode);
      selectedNode = null;
      updatePendingBadge(); updateStats(); updateSidebar();
    }

    function deleteSelectedEdge() {
      if (!selectedEdge) return;
      const e = graphData.edges.get(selectedEdge);
      if (!confirm(`Delete relationship "${e?.label || selectedEdge}"?`)) return;
      graphData.edges.remove(selectedEdge);
      pending.deletedEdges.push(selectedEdge);
      selectedEdge = null;
      updatePendingBadge(); updateSidebar();
    }

    // ── Commit ──
    function showCommitModal() {
      const items = [];
      Object.entries(pending.nodes).forEach(([, c]) =>  items.push(`<div class="change-item">+ Add node: <strong>${c.name}</strong></div>`));
      Object.entries(pending.edges).forEach(([, c]) =>  items.push(`<div class="change-item">+ Add rel: <strong>${c.relType}</strong></div>`));
      pending.deletedNodes.forEach(() => items.push(`<div class="change-item del">− Remove node</div>`));
      pending.deletedEdges.forEach(() => items.push(`<div class="change-item del">− Remove relationship</div>`));
      document.getElementById('commitList').innerHTML = items.join('');
      showModal('commitModal');
    }

    async function commitChanges() {
      const resp = await fetch('/api/commit', {
        method: 'POST', headers: authHeaders(),
        body: JSON.stringify(pending),
      });
      if (!resp.ok) { const err = await resp.json(); alert(err.error || 'Commit failed'); return; }

      pending = { nodes: {}, edges: {}, deletedNodes: [], deletedEdges: [] };
      await loadGraph();
      updatePendingBadge(); updateSidebar();
      closeModal('commitModal');
    }

    // ── Search ──
    function runSearch() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      if (!q) { clearSearch(); return; }

      const matchedNodes = graphData.nodes.get().filter(n =>
        (n._label || n.label || '').toLowerCase().includes(q) || (n.title || '').toLowerCase().includes(q));
      const matchedEdges = graphData.edges.get().filter(e =>
        (e.label || '').toLowerCase().includes(q));

      searchHighlight = new Set(matchedNodes.map(n => String(n.id)));

      const matchIds = matchedNodes.map(n => String(n.id));
      if (matchIds.length) {
        network.selectNodes(matchIds);
        network.fit({ nodes: matchIds });
      }

      const items = [];
      matchedNodes.forEach(n =>
        items.push(`<div class="result-item" onclick="focusNode('${n.id}')">
          <span class="r-name">${n._label || n.label}</span>
          <span class="r-type">${n.title || 'node'}</span>
        </div>`));
      matchedEdges.forEach(e => {
        const fn = graphData.nodes.get(String(e.from));
        const tn = graphData.nodes.get(String(e.to));
        items.push(`<div class="result-item" onclick="focusEdge('${e.id}')">
          <span class="r-name">${fn?._label || e.from} → ${tn?._label || e.to}</span>
          <span class="r-type">${e.label}</span>
        </div>`);
      });

      document.getElementById('searchResults').innerHTML =
        items.length ? items.join('') : '<div class="no-results">No results</div>';
      document.getElementById('searchSection').style.display = 'block';
    }

    function focusNode(id) {
      selectedNode = id; selectedEdge = null;
      network.focus(id, { scale: 1.5 });
      updateSidebar();
    }

    function focusEdge(id) {
      selectedEdge = id; selectedNode = null;
      updateSidebar();
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('searchSection').style.display = 'none';
      searchHighlight = new Set();
      network.unselectAll();
    }

    // ── Wallet ──
    async function downloadWallet() {
      const resp = await fetch('/api/wallet', { headers: authHeaders() });
      const blob = await resp.blob();
      const cd   = resp.headers.get('Content-Disposition') || '';
      const match = cd.match(/filename="([^"]+)"/);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = match ? match[1] : 'twin_card.md';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    // ── Modal helpers ──
    function showModal(id) { document.getElementById(id).classList.add('show'); }
    function closeModal(id) { document.getElementById(id).classList.remove('show'); }
    document.querySelectorAll('.overlay').forEach(o =>
      o.addEventListener('click', e => { if (e.target === o) o.classList.remove('show'); }));

    // ── Boot ──
    window.addEventListener('load', () => {
      render();
      initAuth();
    });
  </script>
</body>
</html>
