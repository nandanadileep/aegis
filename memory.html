<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aegis — Twin Graph</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.css" rel="stylesheet" />
  <style>
    :root {
      --bg: #000;
      --surface: rgba(255,255,255,0.05);
      --surface-hover: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.1);
      --text: #f5f5f7;
      --secondary: #86868b;
      --tertiary: #3a3a3c;
      --accent: #2997ff;
      --accent-dim: rgba(41,151,255,0.15);
      --success: #30d158;
      --error: #ff453a;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      flex-shrink: 0;
      gap: 12px;
      z-index: 50;
    }

    .brand {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
      flex-shrink: 0;
    }

    nav { display: flex; gap: 2px; flex-shrink: 0; }

    .nav-link {
      padding: 5px 13px;
      border-radius: 980px;
      font-size: 13px;
      font-weight: 500;
      color: var(--secondary);
      text-decoration: none;
      transition: all 0.15s;
    }

    .nav-link:hover { background: var(--surface); color: var(--text); }
    .nav-link.active { background: var(--surface); color: var(--text); }

    /* Search */
    .search-wrap {
      flex: 1;
      max-width: 280px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .search-wrap input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 980px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 6px 14px;
      outline: none;
      transition: all 0.18s;
      min-width: 0;
    }

    .search-wrap input:focus {
      border-color: rgba(41,151,255,0.5);
      background: rgba(41,151,255,0.07);
    }

    .search-wrap input::placeholder { color: var(--tertiary); }

    .header-actions { display: flex; gap: 6px; flex-shrink: 0; }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 14px;
      border-radius: 980px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: var(--font);
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn:hover { background: var(--surface-hover); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { background: #0a84ff; border-color: #0a84ff; }

    .btn-success {
      background: rgba(48,209,88,0.15);
      border-color: rgba(48,209,88,0.3);
      color: var(--success);
    }

    .btn-success:hover { background: rgba(48,209,88,0.25); }
    .btn-success:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-danger {
      background: rgba(255,69,58,0.12);
      border-color: rgba(255,69,58,0.25);
      color: var(--error);
    }

    .btn-danger:hover { background: rgba(255,69,58,0.22); }

    .pending-pill {
      padding: 3px 10px;
      border-radius: 980px;
      font-size: 11px;
      font-weight: 700;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--secondary);
      transition: all 0.2s;
    }

    .pending-pill.active {
      background: var(--accent-dim);
      border-color: rgba(41,151,255,0.3);
      color: var(--accent);
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .graph-area {
      flex: 1;
      position: relative;
      background: #000;
    }

    #network { width: 100%; height: 100%; }

    /* ── Sidebar ── */
    .sidebar {
      width: 300px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.02);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--tertiary); border-radius: 2px; }

    .s-section {
      padding: 18px 16px;
      border-bottom: 1px solid var(--border);
    }

    .s-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--tertiary);
      margin-bottom: 12px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 10px;
      background: var(--surface);
      border-radius: 8px;
      margin-bottom: 6px;
    }

    .stat-row .k { font-size: 13px; color: var(--secondary); }
    .stat-row .v { font-size: 13px; font-weight: 600; color: var(--text); }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .detail-row:last-child { border-bottom: none; }
    .detail-row .k { font-size: 12px; color: var(--secondary); }
    .detail-row .v { font-size: 12px; font-weight: 500; color: var(--text); text-align: right; max-width: 60%; word-break: break-word; }

    /* Search results */
    .result-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 4px;
    }

    .result-item:hover { background: var(--surface); }
    .result-item .r-name { font-size: 13px; color: var(--text); }
    .result-item .r-type { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--tertiary); }

    .no-results { font-size: 13px; color: var(--secondary); text-align: center; padding: 20px 0; }

    /* Changes list */
    .change-item {
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      color: var(--text);
      background: var(--accent-dim);
      border: 1px solid rgba(41,151,255,0.15);
      margin-bottom: 5px;
    }

    .change-item.del {
      background: rgba(255,69,58,0.08);
      border-color: rgba(255,69,58,0.2);
    }

    /* Sidebar actions */
    .s-btn-row { display: flex; flex-direction: column; gap: 6px; }

    /* ── Modal ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .overlay.show { display: flex; }

    .modal {
      background: #111;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      width: 90%;
      max-width: 460px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal h3 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .modal p {
      font-size: 13px;
      color: var(--secondary);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }

    .modal-actions .btn { flex: 1; justify-content: center; }

    /* Form fields inside modal */
    .field { margin-bottom: 14px; }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--secondary);
      margin-bottom: 6px;
    }

    .field input, .field textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.18s;
    }

    .field input:focus, .field textarea:focus {
      border-color: rgba(41,151,255,0.5);
    }

    .field input::placeholder, .field textarea::placeholder { color: var(--tertiary); }
    .field textarea { resize: vertical; min-height: 80px; }

    .changes-scroll { max-height: 200px; overflow-y: auto; }

    @media (max-width: 900px) {
      .sidebar { width: 240px; }
    }
  </style>
</head>
<body>
  <header>
    <span class="brand">Aegis</span>
    <nav>
      <a href="/" class="nav-link">Chat</a>
      <a href="/memory" class="nav-link active">Graph</a>
      <a href="/onboarding" class="nav-link">Twin</a>
    </nav>

    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search nodes & relationships…"
        onkeydown="if(event.key==='Enter') runSearch()"
        oninput="if(this.value==='') clearSearch()" />
    </div>

    <div class="header-actions">
      <span class="pending-pill" id="pendingBadge">0 pending</span>
      <button class="btn" onclick="downloadWallet()">⬇ Twin Card</button>
      <button class="btn" id="resetBtn" onclick="resetPendingChanges()" disabled>Reset</button>
      <button class="btn btn-success" id="commitBtn" onclick="showCommitModal()" disabled>Commit</button>
    </div>
  </header>

  <div class="layout">
    <div class="graph-area">
      <div id="network"></div>
    </div>

    <div class="sidebar">
      <!-- Stats -->
      <div class="s-section">
        <div class="s-label">Graph</div>
        <div class="stat-row"><span class="k">Nodes</span><span class="v" id="nodeCount">0</span></div>
        <div class="stat-row"><span class="k">Relationships</span><span class="v" id="edgeCount">0</span></div>
      </div>

      <!-- Search results -->
      <div class="s-section" id="searchSection" style="display:none">
        <div class="s-label">Search Results</div>
        <div id="searchResults"></div>
      </div>

      <!-- Selected node -->
      <div class="s-section" id="nodeSection" style="display:none">
        <div class="s-label">Node</div>
        <div id="nodeDetails"></div>
        <div style="margin-top:12px">
          <button class="btn btn-danger" style="width:100%; justify-content:center" onclick="deleteSelectedNode()">Delete Node</button>
        </div>
      </div>

      <!-- Selected edge -->
      <div class="s-section" id="edgeSection" style="display:none">
        <div class="s-label">Relationship</div>
        <div id="edgeDetails"></div>
        <div style="margin-top:12px">
          <button class="btn btn-danger" style="width:100%; justify-content:center" onclick="deleteSelectedEdge()">Delete Relationship</button>
        </div>
      </div>

      <!-- Add actions -->
      <div class="s-section">
        <div class="s-label">Add</div>
        <div class="s-btn-row">
          <button class="btn" style="justify-content:center" onclick="showAddNodeModal()">+ Node</button>
          <button class="btn" style="justify-content:center" onclick="showAddEdgeModal()">+ Relationship</button>
        </div>
      </div>

      <!-- Pending changes -->
      <div class="s-section" id="changesSection" style="display:none">
        <div class="s-label">Pending</div>
        <div class="changes-scroll" id="changesList"></div>
      </div>
    </div>
  </div>

  <!-- Add Node Modal -->
  <div class="overlay" id="addNodeModal">
    <div class="modal">
      <h3>Add Node</h3>
      <p>Create a new node and link it to your profile.</p>
      <div class="field">
        <label>Label</label>
        <input type="text" id="nodeLabel" placeholder="Skill, Value, Goal…" />
      </div>
      <div class="field">
        <label>Name</label>
        <input type="text" id="nodeName" placeholder="e.g. Python, Discipline…" />
      </div>
      <div class="field">
        <label>Properties (JSON, optional)</label>
        <textarea id="nodeProps" placeholder='{"level": "expert"}'></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal('addNodeModal')">Cancel</button>
        <button class="btn btn-primary" onclick="addNode()">Add Node</button>
      </div>
    </div>
  </div>

  <!-- Add Edge Modal -->
  <div class="overlay" id="addEdgeModal">
    <div class="modal">
      <h3>Add Relationship</h3>
      <p>Connect two existing nodes.</p>
      <div class="field">
        <label>From Node ID</label>
        <input type="text" id="edgeFrom" placeholder="Source node ID" />
      </div>
      <div class="field">
        <label>Relationship Type</label>
        <input type="text" id="edgeType" placeholder="WORKS_ON, KNOWS, HAS_SKILL…" />
      </div>
      <div class="field">
        <label>To Node ID</label>
        <input type="text" id="edgeTo" placeholder="Target node ID" />
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal('addEdgeModal')">Cancel</button>
        <button class="btn btn-primary" onclick="addEdge()">Add Relationship</button>
      </div>
    </div>
  </div>

  <!-- Commit Modal -->
  <div class="overlay" id="commitModal">
    <div class="modal">
      <h3>Commit Changes</h3>
      <p>Apply all pending changes to your memory graph.</p>
      <div class="changes-scroll" id="commitList"></div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal('commitModal')">Cancel</button>
        <button class="btn btn-success" onclick="commitChanges()">Confirm &amp; Save</button>
      </div>
    </div>
  </div>

  <script>
    const personId  = new URLSearchParams(window.location.search).get('person_id') || null;
    const graphData = { nodes: new vis.DataSet([]), edges: new vis.DataSet([]) };
    let network = null;
    let pending = { nodes: {}, edges: {}, deletedNodes: [], deletedEdges: [] };
    let selectedNode = null;
    let selectedEdge = null;

    // ── Init ──
    function initNetwork() {
      const container = document.getElementById('network');
      network = new vis.Network(container, graphData, {
        physics: { enabled: true, stabilization: { iterations: 200 } },
        nodes: {
          shape: 'dot',
          size: 12,
          color: { background: '#1a5aad', border: '#2997ff', highlight: { background: '#2997ff', border: '#fff' } },
          font: { size: 12, color: '#f5f5f7', face: '-apple-system, BlinkMacSystemFont, sans-serif' },
          borderWidth: 1.5,
        },
        edges: {
          color: { color: 'rgba(41,151,255,0.25)', highlight: '#2997ff' },
          font: { size: 10, color: '#86868b', face: '-apple-system, BlinkMacSystemFont, sans-serif' },
          smooth: { type: 'continuous' },
          arrows: 'to',
          width: 1,
        },
        interaction: { navigationButtons: false, keyboard: true, tooltipDelay: 200 },
      });

      network.on('selectNode', p => { selectedNode = p.nodes[0]; selectedEdge = null; updateSidebar(); });
      network.on('selectEdge', p => { selectedEdge = p.edges[0]; selectedNode = null; updateSidebar(); });
      network.on('deselectNode', () => { selectedNode = null; updateSidebar(); });
      network.on('deselectEdge', () => { selectedEdge = null; updateSidebar(); });
    }

    async function loadGraph() {
      const headers = personId ? { 'X-Person-Id': personId } : {};
      const resp = await fetch('/api/graph', { headers });
      if (!resp.ok) { alert('Failed to load graph'); return; }
      const data = await resp.json();
      graphData.nodes.clear();
      graphData.edges.clear();
      graphData.nodes.add(data.nodes);
      graphData.edges.add(data.edges);
      updateStats();
    }

    // ── Sidebar ──
    function updateSidebar() {
      document.getElementById('nodeSection').style.display = selectedNode ? 'block' : 'none';
      document.getElementById('edgeSection').style.display = selectedEdge ? 'block' : 'none';

      if (selectedNode) {
        const n = graphData.nodes.get(selectedNode);
        document.getElementById('nodeDetails').innerHTML = `
          <div class="detail-row"><span class="k">ID</span><span class="v">${n.id}</span></div>
          <div class="detail-row"><span class="k">Name</span><span class="v">${n.label || '—'}</span></div>
          ${n.title ? `<div class="detail-row"><span class="k">Type</span><span class="v">${n.title}</span></div>` : ''}
        `;
      }

      if (selectedEdge) {
        const e  = graphData.edges.get(selectedEdge);
        const fn = graphData.nodes.get(e.from);
        const tn = graphData.nodes.get(e.to);
        document.getElementById('edgeDetails').innerHTML = `
          <div class="detail-row"><span class="k">Type</span><span class="v">${e.label || '—'}</span></div>
          <div class="detail-row"><span class="k">From</span><span class="v">${fn?.label || e.from}</span></div>
          <div class="detail-row"><span class="k">To</span><span class="v">${tn?.label || e.to}</span></div>
        `;
      }

      updateChangesList();
    }

    function updateStats() {
      document.getElementById('nodeCount').textContent = graphData.nodes.length;
      document.getElementById('edgeCount').textContent = graphData.edges.length;
    }

    // ── Pending changes ──
    function updatePendingBadge() {
      const n = Object.keys(pending.nodes).length + Object.keys(pending.edges).length
              + pending.deletedNodes.length + pending.deletedEdges.length;
      const el = document.getElementById('pendingBadge');
      el.textContent = n + ' pending';
      el.classList.toggle('active', n > 0);
      document.getElementById('commitBtn').disabled = n === 0;
      document.getElementById('resetBtn').disabled  = n === 0;
    }

    function updateChangesList() {
      const items = [];
      Object.entries(pending.nodes).forEach(([id, c]) =>
        items.push(`<div class="change-item">+ Node: ${c.name}</div>`));
      Object.entries(pending.edges).forEach(([id, c]) =>
        items.push(`<div class="change-item">+ Rel: ${c.relType}</div>`));
      pending.deletedNodes.forEach(id =>
        items.push(`<div class="change-item del">− Node: ${id}</div>`));
      pending.deletedEdges.forEach(id =>
        items.push(`<div class="change-item del">− Rel: ${id}</div>`));

      const hasChanges = items.length > 0;
      document.getElementById('changesSection').style.display = hasChanges ? 'block' : 'none';
      document.getElementById('changesList').innerHTML = items.join('');
    }

    function resetPendingChanges() {
      if (!confirm('Discard all pending changes?')) return;
      pending = { nodes: {}, edges: {}, deletedNodes: [], deletedEdges: [] };
      loadGraph();
      updatePendingBadge();
      updateSidebar();
    }

    // ── Add node ──
    function showAddNodeModal() {
      document.getElementById('nodeLabel').value = '';
      document.getElementById('nodeName').value  = '';
      document.getElementById('nodeProps').value  = '';
      showModal('addNodeModal');
    }

    async function addNode() {
      const label = document.getElementById('nodeLabel').value.trim();
      const name  = document.getElementById('nodeName').value.trim();
      const propsStr = document.getElementById('nodeProps').value.trim();
      if (!label || !name) { alert('Label and Name are required'); return; }

      let props = {};
      if (propsStr) {
        try { props = JSON.parse(propsStr); }
        catch { alert('Invalid JSON properties'); return; }
      }

      const headers = { 'Content-Type': 'application/json' };
      if (personId) headers['X-Person-Id'] = personId;

      const resp = await fetch('/api/nodes', {
        method: 'POST', headers,
        body: JSON.stringify({ label, name, properties: props }),
      });
      if (!resp.ok) { const e = await resp.json(); alert(e.error || 'Failed'); return; }
      const data = await resp.json();

      graphData.nodes.add({ id: String(data.id), label: name, title: label,
        color: { background: '#0d3d80', border: '#2997ff' } });
      pending.nodes[String(data.id)] = { type: 'add', label, name };
      updatePendingBadge(); updateStats(); updateSidebar();
      closeModal('addNodeModal');
    }

    // ── Add edge ──
    function showAddEdgeModal() {
      document.getElementById('edgeFrom').value = selectedNode || '';
      document.getElementById('edgeType').value = '';
      document.getElementById('edgeTo').value   = '';
      showModal('addEdgeModal');
    }

    async function addEdge() {
      const fromId   = document.getElementById('edgeFrom').value.trim();
      const relType  = document.getElementById('edgeType').value.trim();
      const toId     = document.getElementById('edgeTo').value.trim();
      if (!fromId || !relType || !toId) { alert('All fields required'); return; }
      if (!graphData.nodes.get(fromId) || !graphData.nodes.get(toId)) {
        alert('Node IDs not found in graph'); return;
      }

      const headers = { 'Content-Type': 'application/json' };
      if (personId) headers['X-Person-Id'] = personId;

      const resp = await fetch('/api/relationships', {
        method: 'POST', headers,
        body: JSON.stringify({ from: fromId, type: relType, to: toId }),
      });
      if (!resp.ok) { const e = await resp.json(); alert(e.error || 'Failed'); return; }
      const data = await resp.json();

      graphData.edges.add({ id: String(data.id), from: fromId, to: toId, label: relType });
      pending.edges[String(data.id)] = { type: 'add', relType };
      updatePendingBadge(); updateSidebar();
      closeModal('addEdgeModal');
    }

    // ── Delete ──
    function deleteSelectedNode() {
      if (!selectedNode) return;
      const n = graphData.nodes.get(selectedNode);
      if (!confirm(`Delete "${n.label}"? All its relationships will also be removed.`)) return;

      const connected = graphData.edges.get({ filter: e => e.from === selectedNode || e.to === selectedNode });
      connected.forEach(e => { graphData.edges.remove(e.id); pending.deletedEdges.push(e.id); });
      graphData.nodes.remove(selectedNode);
      pending.deletedNodes.push(selectedNode);
      selectedNode = null;
      updatePendingBadge(); updateStats(); updateSidebar();
    }

    function deleteSelectedEdge() {
      if (!selectedEdge) return;
      const e = graphData.edges.get(selectedEdge);
      if (!confirm(`Delete relationship "${e.label}"?`)) return;
      graphData.edges.remove(selectedEdge);
      pending.deletedEdges.push(selectedEdge);
      selectedEdge = null;
      updatePendingBadge(); updateSidebar();
    }

    // ── Commit ──
    function showCommitModal() {
      const items = [];
      Object.entries(pending.nodes).forEach(([_, c]) =>
        items.push(`<div class="change-item">+ Add node: <strong>${c.name}</strong></div>`));
      Object.entries(pending.edges).forEach(([_, c]) =>
        items.push(`<div class="change-item">+ Add rel: <strong>${c.relType}</strong></div>`));
      pending.deletedNodes.forEach(() =>
        items.push(`<div class="change-item del">− Remove node</div>`));
      pending.deletedEdges.forEach(() =>
        items.push(`<div class="change-item del">− Remove relationship</div>`));
      document.getElementById('commitList').innerHTML = items.join('');
      showModal('commitModal');
    }

    async function commitChanges() {
      const headers = { 'Content-Type': 'application/json' };
      if (personId) headers['X-Person-Id'] = personId;

      const resp = await fetch('/api/commit', {
        method: 'POST', headers,
        body: JSON.stringify(pending),
      });
      if (!resp.ok) { const e = await resp.json(); alert(e.error || 'Commit failed'); return; }

      pending = { nodes: {}, edges: {}, deletedNodes: [], deletedEdges: [] };
      await loadGraph();
      updatePendingBadge(); updateSidebar();
      closeModal('commitModal');
    }

    // ── Search ──
    function runSearch() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      const section = document.getElementById('searchSection');
      if (!q) { clearSearch(); return; }

      const matchedNodes = graphData.nodes.get().filter(n =>
        (n.label||'').toLowerCase().includes(q) || (n.title||'').toLowerCase().includes(q));
      const matchedEdges = graphData.edges.get().filter(e =>
        (e.label||'').toLowerCase().includes(q));

      const allIds = graphData.nodes.getIds();
      const matchIds = matchedNodes.map(n => n.id);

      graphData.nodes.update(allIds.map(id => ({
        id,
        color: matchIds.includes(id)
          ? { background: '#1a5aad', border: '#2997ff', highlight: { background: '#2997ff' } }
          : { background: '#0d0d0d', border: '#1a1a1a' },
      })));

      if (matchIds.length) {
        network.selectNodes(matchIds);
        network.fit({ nodes: matchIds, animation: { duration: 400, easingFunction: 'easeInOutQuad' } });
      }

      const items = [];
      matchedNodes.forEach(n =>
        items.push(`<div class="result-item" onclick="focusNode('${n.id}')">
          <span class="r-name">${n.label}</span>
          <span class="r-type">${n.title || 'node'}</span>
        </div>`));
      matchedEdges.forEach(e => {
        const fn = graphData.nodes.get(e.from);
        const tn = graphData.nodes.get(e.to);
        items.push(`<div class="result-item" onclick="focusEdge('${e.id}')">
          <span class="r-name">${fn?.label || e.from} → ${tn?.label || e.to}</span>
          <span class="r-type">${e.label}</span>
        </div>`);
      });

      document.getElementById('searchResults').innerHTML =
        items.length ? items.join('') : '<div class="no-results">No results</div>';
      section.style.display = 'block';
    }

    function focusNode(id) {
      network.selectNodes([id]);
      network.focus(id, { scale: 1.5, animation: { duration: 400, easingFunction: 'easeInOutQuad' } });
      selectedNode = id; selectedEdge = null; updateSidebar();
    }

    function focusEdge(id) {
      network.selectEdges([id]);
      selectedEdge = id; selectedNode = null; updateSidebar();
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('searchSection').style.display = 'none';
      graphData.nodes.update(graphData.nodes.getIds().map(id => ({
        id,
        color: { background: '#1a5aad', border: '#2997ff', highlight: { background: '#2997ff', border: '#fff' } },
      })));
      network.unselectAll();
    }

    // ── Wallet ──
    async function downloadWallet() {
      const url = personId ? `/api/wallet?person_id=${encodeURIComponent(personId)}` : '/api/wallet';
      const resp = await fetch(url, { headers: personId ? { 'X-Person-Id': personId } : {} });
      const blob = await resp.blob();
      const cd   = resp.headers.get('Content-Disposition') || '';
      const match = cd.match(/filename="([^"]+)"/);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = match ? match[1] : 'twin_card.md';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    // ── Modal helpers ──
    function showModal(id) { document.getElementById(id).classList.add('show'); }
    function closeModal(id) { document.getElementById(id).classList.remove('show'); }

    document.querySelectorAll('.overlay').forEach(o =>
      o.addEventListener('click', e => { if (e.target === o) o.classList.remove('show'); }));

    // ── Boot ──
    window.addEventListener('load', () => {
      initNetwork();
      loadGraph();
    });
  </script>
</body>
</html>
