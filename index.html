<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aegis Chat</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #151820;
      --text: #e6e9f2;
      --muted: #9aa3b5;
      --accent: #4ecdc4;
      --user: #2d72d9;
      --assistant: #2f9e44;
      --border: #1f2430;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", system-ui, -apple-system, sans-serif;
    }
    .sidebar {
      width: 280px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 16px;
      overflow-y: auto;
    }
    .sidebar h2 {
      margin: 0 0 12px;
      font-size: 16px;
      letter-spacing: 0.4px;
      color: var(--muted);
    }
    .context {
      white-space: pre-wrap;
      line-height: 1.4;
      color: var(--text);
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .messages {
      flex: 1;
      padding: 18px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 68%;
      padding: 12px 14px;
      border-radius: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      border: 1px solid var(--border);
    }
    .msg.user {
      margin-left: auto;
      background: rgba(45, 114, 217, 0.12);
      border-color: rgba(45, 114, 217, 0.4);
    }
    .msg.assistant {
      margin-right: auto;
      background: rgba(47, 158, 68, 0.12);
      border-color: rgba(47, 158, 68, 0.4);
    }
    .msg code {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      padding: 1px 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.9em;
    }
    .msg.thinking {
      color: var(--muted);
    }
    .thinking-dots span {
      opacity: 0.2;
      animation: thinking-pulse 1.2s infinite;
    }
    .thinking-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }
    .thinking-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }
    @keyframes thinking-pulse {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }
    .input-bar {
      display: flex;
      padding: 12px;
      border-top: 1px solid var(--border);
      background: var(--panel);
      gap: 10px;
    }
    .input-bar input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0f121a;
      color: var(--text);
      font-size: 15px;
    }
    .input-bar button {
      padding: 12px 16px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #0c0f13;
      font-weight: 700;
      cursor: pointer;
    }
    .input-bar button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Aegis Memory</h2>
    <div id="context" class="context">Loading...</div>
  </div>
  <div class="main" style="width:100%">
    <div class="header">Aegis · Pick Up Where You Left Off</div>
    <div id="messages" class="messages"></div>
    <div class="input-bar">
      <input id="input" type="text" placeholder="Type a message... (/exit to save & close)" autocomplete="off" />
      <button id="send">Send</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const contextEl = document.getElementById('context');
    let sending = false;
    let thinkingEl = null;
    const transcript = [];
    const personId = new URLSearchParams(window.location.search).get('person_id');

    function withPersonId(payload) {
      if (!personId) return payload;
      return { ...payload, person_id: personId };
    }

    async function fetchContext() {
      try {
        const url = personId ? `/context?person_id=${encodeURIComponent(personId)}` : '/context';
        const res = await fetch(url);
        const data = await res.json();
        contextEl.textContent = data.context || 'No stored memory yet.';
      } catch (e) {
        contextEl.textContent = 'Failed to load context.';
      }
    }

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerHTML = renderMessageMarkdown(text);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderMessageMarkdown(text) {
      const escaped = escapeHtml(text);
      return escaped
        .replace(/\*\*([^*\n][\s\S]*?)\*\*/g, '<strong>$1</strong>')
        .replace(/__([^_\n][\s\S]*?)__/g, '<strong>$1</strong>')
        .replace(/`([^`\n]+)`/g, '<code>$1</code>');
    }

    function showThinking() {
      if (thinkingEl) return;
      thinkingEl = document.createElement('div');
      thinkingEl.className = 'msg assistant thinking';
      thinkingEl.innerHTML = 'Thinking<span class="thinking-dots"><span>.</span><span>.</span><span>.</span></span>';
      messagesEl.appendChild(thinkingEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideThinking() {
      if (!thinkingEl) return;
      thinkingEl.remove();
      thinkingEl = null;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || sending) return;
      if (text === '/exit') {
        await saveTranscript();
        window.close();
        return;
      }
      sending = true;
      sendBtn.disabled = true;
      addMessage(text, 'user');
      transcript.push(`You: ${text}`);
      inputEl.value = '';
      showThinking();
      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(withPersonId({message: text}))
        });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || 'Server error');
        }
        const reply = data.reply || 'No response';
        hideThinking();
        addMessage(reply, 'assistant');
        transcript.push(`Assistant: ${reply}`);
      } catch (e) {
        hideThinking();
        addMessage(`Error: ${e.message || 'contacting server'}`, 'assistant');
      } finally {
        hideThinking();
        sending = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    async function saveTranscript() {
      if (!transcript.length) return;
      try {
        await fetch('/save', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(withPersonId({transcript: transcript.join('\\n')}))
        });
        transcript.length = 0;
      } catch (e) {
        console.warn('Save failed', e);
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    window.addEventListener('beforeunload', (e) => {
      if (transcript.length) {
        navigator.sendBeacon('/save', JSON.stringify(withPersonId({transcript: transcript.join('\\n')})));
      }
    });

    fetchContext();
    inputEl.focus();
  </script>
</body>
</html>
