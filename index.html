<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aegis — Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 60px;
      border-bottom: 1px solid #e8e8ed;
      flex-shrink: 0;
      background: #fff;
      z-index: 50;
    }

    .brand {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #1a1a1a;
    }

    nav { display: flex; gap: 4px; }

    .nav-link {
      padding: 6px 14px;
      border-radius: 80px;
      font-size: 13px;
      font-weight: 500;
      color: #6e6e73;
      text-decoration: none;
      transition: all 0.15s;
      border: 1px solid transparent;
    }

    .nav-link:hover { color: #1a1a1a; background: #f5f5f7; }
    .nav-link.active { color: #1a1a1a; border-color: #9e9ea6; background: #fff; }

    .header-right { display: flex; gap: 8px; align-items: center; }

    .btn-sm {
      padding: 7px 16px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
      letter-spacing: -0.01em;
    }

    .btn-primary {
      background: #0d0c20;
      color: #0000ee;
      border: none;
    }
    .btn-primary:hover { opacity: 0.85; }

    .btn-ghost {
      background: #fff;
      color: #1a1a1a;
      border: 1px solid #9e9ea6;
    }
    .btn-ghost:hover { background: #f5f5f7; }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 48px 0 24px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: #e8e8ed; border-radius: 2px; }
    .messages::-webkit-scrollbar-track { background: transparent; }

    .msg-row {
      display: flex;
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      padding: 3px 24px;
    }

    .msg-row.user      { justify-content: flex-end; }
    .msg-row.assistant { justify-content: flex-start; }

    .bubble {
      max-width: 72%;
      padding: 11px 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .bubble.user {
      background: #0d0c20;
      color: #fff;
      border-radius: 20px 20px 4px 20px;
    }

    .bubble.assistant {
      background: #f5f5f7;
      color: #1a1a1a;
      border-radius: 20px 20px 20px 4px;
    }

    .bubble.thinking {
      background: transparent;
      color: #9e9ea6;
      font-size: 13px;
      padding-left: 4px;
    }

    .bubble code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.88em;
      background: rgba(0,0,0,0.07);
      padding: 1px 6px;
      border-radius: 4px;
    }

    .thinking-dots span {
      opacity: 0.3;
      animation: blink 1.4s infinite;
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }

    /* ── Empty state ── */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding-bottom: 80px;
      pointer-events: none;
    }

    .empty h2 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #1a1a1a;
    }

    .empty p {
      font-size: 14px;
      color: #9e9ea6;
      text-align: center;
      max-width: 260px;
      line-height: 1.6;
    }

    /* ── Input ── */
    .input-wrap {
      flex-shrink: 0;
      padding: 12px 24px 32px;
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
    }

    .input-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f5f5f7;
      border: 1px solid #e8e8ed;
      border-radius: 26px;
      padding: 8px 8px 8px 20px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-bar:focus-within {
      border-color: #1a1a1a;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
    }

    .input-bar input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #1a1a1a;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 4px 0;
      min-width: 0;
    }

    .input-bar input::placeholder { color: #9e9ea6; }

    .send-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #0d0c20;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.15s;
      font-size: 15px;
      color: #0000ee;
      font-weight: 700;
    }

    .send-btn:hover  { opacity: 0.85; transform: scale(1.06); }
    .send-btn:disabled { background: #e8e8ed; color: #9e9ea6; cursor: not-allowed; transform: none; }
  </style>
</head>
<body>
  <header>
    <span class="brand">Aegis</span>
    <nav>
      <a href="/chat" class="nav-link active">Chat</a>
      <a href="/memory" class="nav-link">Graph</a>
    </nav>
    <div class="header-right">
      <button class="btn-sm btn-ghost" onclick="saveTranscript()">Save</button>
      <button class="btn-sm btn-primary" onclick="signOut()">Sign out</button>
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="empty" id="emptyState">
      <h2>Start talking.</h2>
      <p>Your twin is listening. As you chat, your profile builds itself.</p>
    </div>
  </div>

  <div class="input-wrap">
    <div class="input-bar">
      <input id="input" type="text" placeholder="Message your twin…" autocomplete="off" />
      <button class="send-btn" id="send" title="Send">↑</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = window.supabase;
    let sb = null, _session = null;

    async function initAuth() {
      const cfg = await fetch('/api/config').then(r => r.json());
      sb = createClient(cfg.supabase_url, cfg.supabase_anon_key);
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '/login'; return; }
      _session = session;
      sb.auth.onAuthStateChange((_e, s) => { _session = s; if (!s) window.location.href = '/login'; });
    }

    function authHeaders() {
      return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${_session.access_token}` };
    }

    async function signOut() {
      await sb.auth.signOut();
      window.location.href = '/login';
    }

    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('input');
    const sendBtn    = document.getElementById('send');
    const emptyState = document.getElementById('emptyState');
    let sending = false, thinkingEl = null;
    const transcript = [];

    function addMessage(text, role) {
      if (emptyState) emptyState.style.display = 'none';
      const row    = document.createElement('div');
      row.className = `msg-row ${role}`;
      const bubble = document.createElement('div');
      bubble.className = `bubble ${role}`;
      bubble.innerHTML = renderMarkdown(text);
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(t) {
      return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
               .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function renderMarkdown(text) {
      return escapeHtml(text)
        .replace(/\*\*([^*\n][\s\S]*?)\*\*/g, '<strong>$1</strong>')
        .replace(/__([^_\n][\s\S]*?)__/g, '<strong>$1</strong>')
        .replace(/`([^`\n]+)`/g, '<code>$1</code>');
    }

    function showThinking() {
      if (thinkingEl) return;
      const row = document.createElement('div');
      row.className = 'msg-row assistant';
      thinkingEl = document.createElement('div');
      thinkingEl.className = 'bubble thinking';
      thinkingEl.innerHTML = '<span class="thinking-dots"><span>●</span><span>●</span><span>●</span></span>';
      row.appendChild(thinkingEl);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideThinking() {
      if (!thinkingEl) return;
      thinkingEl.parentElement?.remove();
      thinkingEl = null;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || sending) return;

      sending = true;
      sendBtn.disabled = true;
      addMessage(text, 'user');
      transcript.push(`You: ${text}`);
      inputEl.value = '';
      showThinking();

      try {
        const res  = await fetch('/chat', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ message: text }) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Server error');
        hideThinking();
        addMessage(data.reply || 'No response', 'assistant');
        transcript.push(`Assistant: ${data.reply}`);
      } catch (e) {
        hideThinking();
        addMessage(`Error: ${e.message}`, 'assistant');
      } finally {
        hideThinking();
        sending = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    async function saveTranscript() {
      if (!transcript.length) return;
      try {
        await fetch('/save', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ transcript: transcript.join('\n') }) });
        transcript.length = 0;
      } catch (e) { console.warn('Save failed', e); }
    }

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

    window.addEventListener('beforeunload', () => {
      if (transcript.length && _session)
        navigator.sendBeacon('/save', JSON.stringify({ transcript: transcript.join('\n') }));
    });

    initAuth().then(() => inputEl.focus());
  </script>
</body>
</html>
