<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aegis</title>
  <style>
    :root {
      --bg: #000;
      --surface: rgba(255,255,255,0.05);
      --surface-hover: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.1);
      --text: #f5f5f7;
      --secondary: #86868b;
      --tertiary: #3a3a3c;
      --accent: #2997ff;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      --mono: "SF Mono", "Fira Code", "Menlo", monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      flex-shrink: 0;
      z-index: 50;
    }

    .brand {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    nav { display: flex; gap: 2px; }

    .nav-link {
      padding: 5px 13px;
      border-radius: 980px;
      font-size: 13px;
      font-weight: 500;
      color: var(--secondary);
      text-decoration: none;
      transition: all 0.15s;
    }

    .nav-link:hover { background: var(--surface); color: var(--text); }
    .nav-link.active { background: var(--surface); color: var(--text); }

    .header-right { display: flex; gap: 8px; }

    .btn-sm {
      padding: 5px 14px;
      border-radius: 980px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: var(--font);
      transition: all 0.15s;
    }

    .btn-sm:hover { background: var(--surface-hover); }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 40px 0 20px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: var(--tertiary); border-radius: 2px; }
    .messages::-webkit-scrollbar-track { background: transparent; }

    .msg-row {
      display: flex;
      padding: 3px 0;
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding-left: 24px;
      padding-right: 24px;
    }

    .msg-row.user     { justify-content: flex-end; }
    .msg-row.assistant { justify-content: flex-start; }

    .bubble {
      max-width: 75%;
      padding: 11px 16px;
      font-size: 15px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .bubble.user {
      background: var(--accent);
      color: #fff;
      border-radius: 20px 20px 6px 20px;
    }

    .bubble.assistant {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 20px 20px 20px 6px;
    }

    .bubble.thinking {
      background: transparent;
      border: none;
      color: var(--secondary);
      font-size: 14px;
      padding-left: 4px;
    }

    .bubble code {
      font-family: var(--mono);
      font-size: 0.88em;
      background: rgba(255,255,255,0.1);
      padding: 1px 6px;
      border-radius: 4px;
    }

    .bubble.user code { background: rgba(255,255,255,0.2); }

    .thinking-dots span {
      opacity: 0.25;
      animation: blink 1.4s infinite;
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.25; }
      40%  { opacity: 1; }
    }

    /* ── Empty state ── */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding-bottom: 80px;
      pointer-events: none;
    }

    .empty h2 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .empty p {
      font-size: 15px;
      color: var(--secondary);
      text-align: center;
      max-width: 280px;
      line-height: 1.5;
    }

    /* ── Input ── */
    .input-wrap {
      flex-shrink: 0;
      padding: 12px 24px 28px;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
    }

    .input-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 26px;
      padding: 8px 8px 8px 20px;
      transition: border-color 0.2s;
    }

    .input-bar:focus-within { border-color: rgba(255,255,255,0.22); }

    .input-bar input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      padding: 4px 0;
      min-width: 0;
    }

    .input-bar input::placeholder { color: var(--tertiary); }

    .send-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.15s;
      font-size: 15px;
      color: #fff;
      font-weight: 700;
    }

    .send-btn:hover  { background: #0a84ff; transform: scale(1.06); }
    .send-btn:disabled { background: var(--tertiary); cursor: not-allowed; transform: none; }

    .hint {
      text-align: center;
      font-size: 11px;
      color: var(--tertiary);
      margin-top: 10px;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <header>
    <span class="brand">Aegis</span>
    <nav>
      <a href="/" class="nav-link active">Chat</a>
      <a href="/memory" class="nav-link">Graph</a>
      <a href="/onboarding" class="nav-link">Twin</a>
    </nav>
    <div class="header-right">
      <button class="btn-sm" onclick="saveTranscript()">Save</button>
      <button class="btn-sm" onclick="signOut()">Sign out</button>
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="empty" id="emptyState">
      <h2>Start talking.</h2>
      <p>As you chat, your twin profile builds itself.</p>
    </div>
  </div>

  <div class="input-wrap">
    <div class="input-bar">
      <input id="input" type="text" placeholder="Message your twin…" autocomplete="off" />
      <button class="send-btn" id="send" title="Send">↑</button>
    </div>
    <p class="hint">Type /exit to save &amp; close</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = window.supabase;
    let sb = null;
    let _session = null;

    async function initAuth() {
      const cfg = await fetch('/api/config').then(r => r.json());
      sb = createClient(cfg.supabase_url, cfg.supabase_anon_key);
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '/login'; return; }
      _session = session;
      sb.auth.onAuthStateChange((_e, s) => { _session = s; if (!s) window.location.href = '/login'; });
    }

    function authHeaders() {
      return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${_session.access_token}` };
    }

    async function signOut() {
      await sb.auth.signOut();
      window.location.href = '/login';
    }

    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('input');
    const sendBtn    = document.getElementById('send');
    const emptyState = document.getElementById('emptyState');
    let sending    = false;
    let thinkingEl = null;
    const transcript = [];

    function addMessage(text, role) {
      if (emptyState) emptyState.style.display = 'none';
      const row    = document.createElement('div');
      row.className = `msg-row ${role}`;
      const bubble = document.createElement('div');
      bubble.className = `bubble ${role}`;
      bubble.innerHTML = renderMarkdown(text);
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(t) {
      return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
               .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function renderMarkdown(text) {
      return escapeHtml(text)
        .replace(/\*\*([^*\n][\s\S]*?)\*\*/g, '<strong>$1</strong>')
        .replace(/__([^_\n][\s\S]*?)__/g, '<strong>$1</strong>')
        .replace(/`([^`\n]+)`/g, '<code>$1</code>');
    }

    function showThinking() {
      if (thinkingEl) return;
      const row    = document.createElement('div');
      row.className = 'msg-row assistant';
      thinkingEl = document.createElement('div');
      thinkingEl.className = 'bubble thinking';
      thinkingEl.innerHTML = '<span class="thinking-dots"><span>●</span><span>●</span><span>●</span></span>';
      row.appendChild(thinkingEl);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideThinking() {
      if (!thinkingEl) return;
      thinkingEl.parentElement?.remove();
      thinkingEl = null;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || sending) return;

      if (text === '/exit') {
        await saveTranscript();
        window.close();
        return;
      }

      sending = true;
      sendBtn.disabled = true;
      addMessage(text, 'user');
      transcript.push(`You: ${text}`);
      inputEl.value = '';
      showThinking();

      try {
        const res  = await fetch('/chat', {
          method:  'POST',
          headers: authHeaders(),
          body:    JSON.stringify({ message: text }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Server error');
        hideThinking();
        addMessage(data.reply || 'No response', 'assistant');
        transcript.push(`Assistant: ${data.reply}`);
      } catch (e) {
        hideThinking();
        addMessage(`Error: ${e.message}`, 'assistant');
      } finally {
        hideThinking();
        sending = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    async function saveTranscript() {
      if (!transcript.length) return;
      try {
        await fetch('/save', {
          method:  'POST',
          headers: authHeaders(),
          body:    JSON.stringify({ transcript: transcript.join('\n') }),
        });
        transcript.length = 0;
      } catch (e) { console.warn('Save failed', e); }
    }

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

    window.addEventListener('beforeunload', () => {
      if (transcript.length && _session) {
        navigator.sendBeacon('/save', JSON.stringify({ transcript: transcript.join('\n') }));
      }
    });

    initAuth().then(() => inputEl.focus());
  </script>
</body>
</html>
