<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aegis — Sign in</title>
  <style>
    :root {
      --bg: #000;
      --surface: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.1);
      --text: #f5f5f7;
      --secondary: #86868b;
      --accent: #2997ff;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 48px 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 380px;
      animation: rise 0.4s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .brand { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; color: var(--secondary); }
    h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; text-align: center; }
    p { font-size: 15px; color: var(--secondary); text-align: center; line-height: 1.5; }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px 20px;
      background: #fff;
      color: #111;
      border: none;
      border-radius: 980px;
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-google:hover { opacity: 0.9; }
    .btn-google:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { font-size: 13px; color: var(--secondary); min-height: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <span class="brand">Aegis</span>
    <h1>Sign in</h1>
    <p>Your digital twin, your data. Sign in to continue.</p>
    <button class="btn-google" id="googleBtn" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
      Continue with Google
    </button>
    <span class="status" id="status"></span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = window.supabase;
    let sb = null;

    async function init() {
      const cfg = await fetch('/api/config').then(r => r.json());
      sb = createClient(cfg.supabase_url, cfg.supabase_anon_key);

      // Handle OAuth redirect — Supabase puts the session in the URL hash
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        redirect(session);
        return;
      }

      sb.auth.onAuthStateChange((_event, session) => {
        if (session) redirect(session);
      });
    }

    async function redirect(session) {
      // Check if this user already has a profile
      const res = await fetch('/api/me', {
        headers: { 'Authorization': `Bearer ${session.access_token}` }
      });
      const data = await res.json();
      window.location.href = data.exists ? '/chat' : '/onboarding';
    }

    async function signInWithGoogle() {
      if (!sb) return;
      document.getElementById('googleBtn').disabled = true;
      document.getElementById('status').textContent = 'Redirecting…';
      await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/login' },
      });
    }

    init();
  </script>
</body>
</html>
