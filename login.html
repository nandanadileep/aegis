<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aegis — Sign in</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fff;
      --surface: #f5f5f7;
      --border: #e8e8ed;
      --border-strong: #9e9ea6;
      --text: #1a1a1a;
      --text-2: #6e6e73;
      --text-3: #9e9ea6;
      --btn-primary-bg: #0d0c20;
      --btn-primary-text: #0000ee;
      --header-bg: #fff;
    }

    [data-theme="dark"] {
      --bg: #0f0f13;
      --surface: #1c1c1f;
      --border: rgba(255,255,255,0.1);
      --border-strong: rgba(255,255,255,0.22);
      --text: #f5f5f7;
      --text-2: #8e8e93;
      --text-3: #48484a;
      --btn-primary-bg: #0000ee;
      --btn-primary-text: #fff;
      --header-bg: #0f0f13;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.2s, color 0.2s;
      -webkit-font-smoothing: antialiased;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 60px;
      border-bottom: 1px solid var(--border);
      background: var(--header-bg);
      transition: background 0.2s, border-color 0.2s;
    }

    .brand {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .theme-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.15s;
    }
    .theme-btn:hover { background: var(--border); }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      animation: rise 0.4s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-top { display: flex; flex-direction: column; gap: 8px; }

    h1 {
      font-size: 40px;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text);
    }

    .sub {
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.6;
    }

    .divider {
      height: 1px;
      background: var(--border);
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 24px;
      background: var(--btn-primary-bg);
      color: var(--btn-primary-text);
      border: none;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: -0.01em;
    }

    .btn-google:hover { opacity: 0.88; }
    .btn-google:disabled { opacity: 0.45; cursor: not-allowed; }

    .status {
      font-size: 13px;
      color: var(--text-2);
      text-align: center;
      min-height: 18px;
    }

    .footer-note {
      font-size: 12px;
      color: var(--text-3);
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <header>
    <span class="brand">Aegis</span>
    <button class="theme-btn" id="themeToggle" title="Toggle theme" onclick="toggleTheme()">🌙</button>
  </header>

  <div class="main">
    <div class="card">
      <div class="card-top">
        <h1>Sign in.</h1>
        <p class="sub">Your digital twin lives here. Sign in to continue building it.</p>
      </div>

      <div class="divider"></div>

      <button class="btn-google" id="googleBtn" onclick="signInWithGoogle()">
        <svg width="16" height="16" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
        Continue with Google
      </button>

      <span class="status" id="status"></span>

      <p class="footer-note">By signing in, you agree to keep your twin data private and secure.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ── Theme ──
    const THEME_KEY = 'aegis-theme';
    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      document.getElementById('themeToggle').textContent = t === 'dark' ? '☀️' : '🌙';
    }
    function toggleTheme() {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      localStorage.setItem(THEME_KEY, next);
      applyTheme(next);
    }
    applyTheme(localStorage.getItem(THEME_KEY) || 'light');

    // ── Auth ──
    const { createClient } = window.supabase;
    let sb = null;

    async function init() {
      const cfg = await fetch('/api/config').then(r => r.json());
      sb = createClient(cfg.supabase_url, cfg.supabase_anon_key);
      const { data: { session } } = await sb.auth.getSession();
      if (session) { redirect(session); return; }
      sb.auth.onAuthStateChange((_event, session) => { if (session) redirect(session); });
    }

    async function redirect(session) {
      const res  = await fetch('/api/me', { headers: { 'Authorization': `Bearer ${session.access_token}` } });
      const data = await res.json();
      window.location.href = data.exists ? '/chat' : '/onboarding';
    }

    async function signInWithGoogle() {
      if (!sb) return;
      document.getElementById('googleBtn').disabled = true;
      document.getElementById('status').textContent = 'Redirecting…';
      await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/login' },
      });
    }

    init();
  </script>
</body>
</html>
